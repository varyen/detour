# Detour panel — dedicated Entware lighttpd instance on :8080.
# Launch:  lighttpd -f /opt/etc/lighttpd/detour.conf   (wrapped by S51detour-panel)
# Keenetic's own web UI keeps :80; we take :8080 to mirror the GL.iNet panel URL.
#
# ⚠ VALIDATE on device: module paths (server.modules dir), and that the deployed CGI
#   shebang is #!/opt/bin/sh (the Keenetic deploy step must rewrite #!/bin/sh → /opt/bin/sh)
#   so lighttpd's "execute directly" mode works.

server.modules = ( "mod_cgi", "mod_alias", "mod_setenv" )

# lighttpd gives CGIs a minimal PATH. Entware tools (sed/grep/openssl/base64/…)
# live under /opt — without this the CGI's `sed`/`openssl` calls silently fail.
# (The CGI also exports PATH itself; this is belt-and-suspenders via mod_setenv.)
setenv.add-environment = ( "PATH" => "/opt/bin:/opt/sbin:/usr/bin:/usr/sbin:/bin:/sbin" )

# Doc-root is the www ROOT (not …/detour) so the panel lives at /detour/ —
# mirrors the GL.iNet URL. index.html is at /opt/share/www/detour/index.html;
# the CGI is reached via the /cgi-bin/ alias below (absolute path in the SPA).
# (No bare-/ redirect — would need lighttpd-mod-redirect; just use /detour/.)
server.document-root = "/opt/share/www"
server.port          = 8080
server.bind          = "0.0.0.0"
server.errorlog      = "/opt/var/log/detour-lighttpd.log"
server.pid-file      = "/opt/var/run/detour-lighttpd.pid"
server.upload-dirs   = ( "/tmp" )
# Panel uploads .ipk for self-update / config import — allow large bodies.
server.max-request-size = 0
server.max-keep-alive-idle = 20

index-file.names = ( "index.html" )
mimetype.assign  = (
    ".html" => "text/html; charset=utf-8",
    ".svg"  => "image/svg+xml",
    ".json" => "application/json",
    ".css"  => "text/css",
    ".js"   => "application/javascript"
)

# /cgi-bin/detour-api  ->  /opt/share/www/cgi-bin/detour-api  (executed via its shebang)
alias.url += ( "/cgi-bin/" => "/opt/share/www/cgi-bin/" )
$HTTP["url"] =~ "^/cgi-bin/" {
    cgi.assign = ( "" => "" )        # empty interpreter = run the file directly
    cgi.execute-x-only = "enable"
}

# TLS overlay written by `detour-cert` once a Let's Encrypt cert is issued (see the
# HTTPS-сертификат panel section). Absent until then → `cat` outputs nothing → no-op.
# It adds an HTTPS socket (:443 by default) so the panel is reachable over TLS — the
# Web Push feature needs HTTPS. Requires lighttpd-mod-openssl. On KeeneticOS, :80/:443
# belong to the stock router UI, so issuance uses an HTTP-01 challenge served by THIS
# lighttpd (:8080) reached via a WAN :80 → :8080 port-forward; see keenetic/VERIFY-cert-http01.md.
include_shell "cat /opt/etc/lighttpd/conf.d/detour-ssl.conf 2>/dev/null"
