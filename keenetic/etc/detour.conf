# Detour / Keenetic runtime config — deployed to /opt/etc/detour/detour.conf
# Sourced by the init.d services and the netfilter.d hook so those stay device-agnostic.
# ⚠ VALIDATE LAN_IF on the device (`ip -o link` / `ip a`); MT7621 KeeneticOS LAN bridge
#   is usually br0, but confirm.

# LAN bridge the clients sit on (transparent-proxy applies on this interface).
LAN_IF="br0"

# Redirect ports (match the sing-box/tpws listen ports).
SINGBOX_PORT="12345"
ZAPRET_PORT="1081"

# Panel (lighttpd) port to accept from LAN.
PANEL_PORT="8080"

# Binaries + configs (Entware /opt layout).
# sing-box comes from the Entware `sing-box-go` opkg package → /opt/bin/sing-box.
# tpws is bundled by the detour package (no zapret in the Entware feed) → /opt/sbin.
SINGBOX_BIN="/opt/bin/sing-box"
SINGBOX_CONF="/opt/etc/sing-box/config.json"
SINGBOX_LOG="/opt/var/log/sing-box.log"
TPWS_BIN="/opt/sbin/tpws-zapret"
TPWS_CONF="/opt/etc/zapret-tpws.conf"

# ipset names (populated by Entware dnsmasq, matched in the nat hook).
SINGBOX_IPSET="singbox_domains"
ZAPRET_IPSET="zapret_domains"
