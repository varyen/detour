# Detour / Keenetic runtime config — deployed to /opt/etc/detour/detour.conf
# Sourced by the init.d services and the netfilter.d hook so those stay device-agnostic.
# ⚠ VALIDATE LAN_IF on the device (`ip -o link` / `ip a`); MT7621 KeeneticOS LAN bridge
#   is usually br0, but confirm.

# LAN bridge the clients sit on (transparent-proxy applies on this interface).
LAN_IF="br0"

# Redirect ports (match the sing-box/tpws listen ports).
SINGBOX_PORT="12345"
ZAPRET_PORT="1081"

# Panel (lighttpd) port to accept from LAN.
PANEL_PORT="8080"

# Binaries + configs (Entware /opt layout).
# sing-box + tpws-zapret both come from OUR mipsel opkg feed (feed/mipsel):
# sing-box → /opt/bin/sing-box (pkg `sing-box`, the -mipsle-softfloat-musl build;
# Entware's `sing-box-go` is only a fallback), tpws → /opt/sbin/tpws-zapret (pkg
# `tpws-zapret`, bol-van/zapret linux-mipsel — no longer bundled in the panel).
SINGBOX_BIN="/opt/bin/sing-box"
SINGBOX_CONF="/opt/etc/sing-box/config.json"
SINGBOX_LOG="/opt/var/log/sing-box.log"
TPWS_BIN="/opt/sbin/tpws-zapret"
TPWS_CONF="/opt/etc/zapret-tpws.conf"

# ipset names (populated by the detour Entware dnsmasq, matched in the nat hook).
SINGBOX_IPSET="singbox_domains"
ZAPRET_IPSET="zapret_domains"
SINGBOX_WL_IPSET="singbox_whitelist"

# --- Domain→ipset DNS (Keenetic parity with OpenWrt) ---------------------------
# KeeneticOS owns :53, so we run our OWN Entware dnsmasq on a side port and
# transparently REDIRECT LAN :53 to it (in 50-detour.sh). That dnsmasq tags
# resolved IPs into the ipsets via `ipset=/domain/...` lines we generate from the
# domain lists, exactly like the OpenWrt build. S50detour-dns manages it.
#   ⚠ VALIDATE on device:
#     * dnsmasq-full binary path (Entware: /opt/sbin/dnsmasq) and `ipset=` support.
#     * that KeeneticOS does not itself force-redirect/intercept client :53
#       (some firmwares do) — if it does, this transparent redirect may conflict.
#     * DETOUR_DNS_UPSTREAM: clients lose KeeneticOS local-name resolution while
#       redirected; set to your preferred resolver (default 1.1.1.1).
DNSMASQ_BIN="/opt/sbin/dnsmasq"
DETOUR_DNS_PORT="5354"
DETOUR_DNS_UPSTREAM="1.1.1.1"
DNSMASQ_CONF_DIR="/opt/etc/detour/dnsmasq.d"
DNSMASQ_HOSTS_DIR="/tmp/hosts"          # addn-hosts dir (Hosts-DNS writes here)

# Domain/route-list sources (mirror OpenWrt; /opt layout on Entware).
SINGBOX_DOMAINS_LIST="/opt/etc/sing-box/proxy-domains.list"
SINGBOX_WHITELIST_LIST="/opt/etc/sing-box/whitelist-domains.list"
SINGBOX_ROUTEMAP_LIST="/opt/etc/sing-box/route-map.list"
ZAPRET_DOMAINS_LIST="/opt/etc/zapret-tpws/domains.list"
SINGBOX_CONFIG_DIR="/opt/etc/sing-box"
SINGBOX_SETTINGS="/opt/etc/sing-box/settings.json"
